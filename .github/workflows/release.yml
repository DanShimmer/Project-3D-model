name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

env:
  # Determine the release tag: use input version for manual dispatch, otherwise use the git tag
  RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  # ─────────────────────────── Windows Build ───────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Build & Package (Windows)
        working-directory: front-end
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            front-end/release/*.exe
            front-end/release/*.msi
          if-no-files-found: warn
          retention-days: 5

  # ─────────────────────────── macOS Build ─────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Generate macOS icon (.icns)
        working-directory: front-end
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     public/icons/icon-512x512.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     public/icons/icon-512x512.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     public/icons/icon-512x512.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     public/icons/icon-512x512.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   public/icons/icon-512x512.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   public/icons/icon-512x512.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   public/icons/icon-512x512.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   public/icons/icon-512x512.png --out icon.iconset/icon_256x256@2x.png
          cp public/icons/icon-512x512.png icon.iconset/icon_512x512.png
          iconutil -c icns icon.iconset -o public/icon.icns
          rm -rf icon.iconset
          echo "✅ icon.icns generated"

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Build & Package (macOS)
        working-directory: front-end
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # Skip code signing (no Apple Developer cert in CI)

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            front-end/release/*.dmg
            front-end/release/*.zip
          if-no-files-found: warn
          retention-days: 5

  # ─────────────────────────── Linux Build ─────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Build & Package (Linux)
        working-directory: front-end
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            front-end/release/*.AppImage
            front-end/release/*.deb
            front-end/release/*.rpm
            front-end/release/*.snap
          if-no-files-found: warn
          retention-days: 5

  # ─────────────────────────── Create Release ──────────────────────────
  create-release:
    needs: [build-windows, build-macos, build-linux]
    # Run even if some builds failed — create release with whatever succeeded
    if: always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tag for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f ${{ env.RELEASE_TAG }}
          git push origin ${{ env.RELEASE_TAG }} --force

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f 2>/dev/null || echo "No artifacts found"
          echo "=== Total files ==="
          find artifacts -type f 2>/dev/null | wc -l

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Polyva 3D ${{ env.RELEASE_TAG }}"
          body: |
            ## 🚀 Polyva 3D ${{ env.RELEASE_TAG }}

            ### Downloads
            | Platform | File | Type |
            |----------|------|------|
            | 🪟 Windows | `Polyva-3D-*-Setup.exe` | Installer (Recommended) |
            | 🪟 Windows | `Polyva-3D-*-Portable.exe` | Portable (No install needed) |
            | 🍎 macOS | `Polyva-3D-*.dmg` | DMG Installer |
            | 🍎 macOS | `Polyva-3D-*.zip` | ZIP Archive |
            | 🐧 Linux | `Polyva-3D-*.AppImage` | AppImage (Universal) |
            | 🐧 Linux | `Polyva-3D-*.deb` | Debian/Ubuntu Package |

            ### ✨ What's New in v2.0
            - 🧠 **Hunyuan3D-2 Engine** — Tencent's state-of-the-art 3D generation (replaces TripoSR)
            - 🎨 **Stable Diffusion 1.5 / SDXL** — AI image generation for text-to-3D pipeline
            - ⚡ **Async Generation** — Non-blocking polling with real-time progress tracking
            - 🔧 **Remesh** — Decimate/smooth mesh post-processing
            - 🎨 **AI Texturing** — ControlNet depth-based texture generation
            - 🦴 **Auto Rigging** — Automatic skeleton with symmetric joint markers
            - 🏃 **Animations** — Walk & Death animation presets
            - 📦 **Export** — Download as .glb, .obj, .stl, .fbx
            - 💾 **My Storage** — Save & manage models with 3D thumbnails
            - 🖼️ **Showcase** — Community gallery to share creations
            - 🌗 **Dark/Light Theme** — Full theme support
            - 🖥️ **GPU Optimized** — Auto-configured for your VRAM (6GB–24GB+)

            ### System Requirements
            - **Desktop App**: Windows 10+, macOS 11+, or Linux (Ubuntu 20.04+)
            - **AI Backend** (separate): NVIDIA GPU with 6GB+ VRAM, CUDA 11.8/12.1, Python 3.10-3.11
          draft: false
          prerelease: false
          files: |
            artifacts/**
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
